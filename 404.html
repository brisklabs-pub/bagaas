<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>
        Redirecting...
    </title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            width: 100%;
            height: 100vh;

            overflow: hidden;

            display: flex;
            align-items: center;
            justify-content: center;

            background:
                radial-gradient(circle at top,
                    #1e3a8a,
                    #0f172a 60%);

            font-family:
                Inter,
                system-ui,
                sans-serif;

            color: white;
        }

        .redirect-container {

            text-align: center;

            padding: 40px;

            max-width: 560px;
        }

        /* =========================================
       BRAND
    ========================================= */

        .brand {

            display: flex;
            align-items: center;
            justify-content: center;

            gap: 18px;

            margin-bottom: 34px;

            animation:
                floatLogo 3s ease-in-out infinite;
        }

        .logo {

            width: 90px;
            height: 90px;

            border-radius: 26px;

            background:
                rgba(255, 255, 255, 0.08);

            backdrop-filter: blur(10px);

            border:
                1px solid rgba(255, 255, 255, 0.12);

            display: flex;
            align-items: center;
            justify-content: center;

            box-shadow:
                0 20px 40px rgba(0, 0, 0, 0.25);
        }

        .logo img {

            width: 70%;
            height: 70%;

            object-fit: contain;
        }

        .brand-text {

            text-align: left;
        }

        .brand-text h2 {

            font-size: 34px;
            font-weight: 800;

            line-height: 1;

            letter-spacing: -1px;
        }

        .brand-text span {

            display: block;

            margin-top: 8px;

            font-size: 14px;

            color:
                rgba(255, 255, 255, 0.68);

            letter-spacing: 1px;

            text-transform: uppercase;
        }

        /* =========================================
       CONTENT
    ========================================= */

        h1 {

            font-size: 42px;
            font-weight: 800;

            margin-bottom: 16px;

            letter-spacing: -1px;
        }

        p {

            font-size: 17px;

            line-height: 1.8;

            color:
                rgba(255, 255, 255, 0.78);

            margin-bottom: 30px;
        }

        /* =========================================
       LOADER
    ========================================= */

        .loader {

            width: 54px;
            height: 54px;

            margin: 0 auto;

            border-radius: 50%;

            border:
                4px solid rgba(255, 255, 255, 0.15);

            border-top:
                4px solid #60a5fa;

            animation:
                spin 1s linear infinite;
        }

        .small {

            margin-top: 34px;

            font-size: 13px;

            color:
                rgba(255, 255, 255, 0.45);
        }

        /* =========================================
       ANIMATIONS
    ========================================= */

        @keyframes spin {

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes floatLogo {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        /* =========================================
       MOBILE
    ========================================= */

        @media (max-width: 768px) {

            .redirect-container {
                padding: 24px;
            }

            .brand {
                flex-direction: column;
                gap: 14px;
            }

            .brand-text {
                text-align: center;
            }

            .brand-text h2 {
                font-size: 28px;
            }

            h1 {
                font-size: 32px;
            }

            p {
                font-size: 15px;
            }

            .logo {
                width: 78px;
                height: 78px;
            }
        }
    </style>

    <script>

        /*
        =========================================
        GITHUB PAGES SPA REDIRECT
        =========================================
        */

        sessionStorage.redirect =
            location.pathname +
            location.search +
            location.hash;

        setTimeout(() => {
          location.replace("/");
        }, 3000);

    </script>

</head>

<body>

    <div class="redirect-container">

        <!-- BRAND -->
        <div class="brand">

            <div class="logo">

                <img src="./assets/images/mspc-logo-pev.png" alt="MSPC Logo" />

            </div>

            <div class="brand-text">

                <h2>
                    MSPC - Bagaas
                </h2>

                <span>
                    School Portal
                </span>

            </div>

        </div>

        <!-- CONTENT -->
        <h1>
            Redirecting...
        </h1>

        <p>
            Loading your requested page.
            Please wait while we redirect
            you to the correct content.
        </p>

        <!-- LOADER -->
        <div class="loader"></div>

        <div class="small">
            Powered by BriskLabs
        </div>

    </div>

</body>

</html>
